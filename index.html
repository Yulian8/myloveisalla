<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей зайки</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            /* Глубокий космический градиент */
            background: radial-gradient(circle at center, #161233 0%, #0d0b1e 50%, #05040a 100%);
            background-color: #05040a; /* Фоллбек */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Эффект звёздного неба через множественные радиальные градиенты */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle, #ffffff 1px, transparent 1px),
                radial-gradient(circle, rgba(255, 255, 255, 0.7) 1.5px, transparent 1.5px),
                radial-gradient(circle, rgba(255, 255, 255, 0.4) 2px, transparent 2px);
            background-size: 200px 200px, 350px 350px, 500px 500px;
            background-position: 0 0, 40px 70px, 130px 240px;
            opacity: 0.65;
            z-index: 1;
        }

        /* Контейнер с текстом */
        .content {
            text-align: center;
            z-index: 2;
            padding: 20px;
            max-width: 700px;
        }

        /* Лаконичный красивый текст */
        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 0.5px;
            /* Мягкое неоновое свечение */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3), 
                         0 0 30px rgba(154, 107, 255, 0.4);
        }

        /* Декоративное аккуратное сердечко */
        .heart {
            margin-top: 25px;
            font-size: 1.5rem;
            color: #ff5e7e;
            text-shadow: 0 0 10px rgba(255, 94, 126, 0.6);
            animation: pulse 2.5s infinite ease-in-out;
        }

        /* Мягкая пульсация сердца */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.12); opacity: 1; text-shadow: 0 0 15px rgba(255, 94, 126, 0.9); }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Скоро здесь будет всё о том,<br>как я люблю свою зайку</h1>
        <div class="heart">❤</div>
    </div>

</body>
</html>
